name: Public CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  public:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build --workspace=packages/cli

      - name: Test CLI
        run: npm test --workspace=packages/cli

      - name: Build Worker
        run: npm run build --workspace=workers/api

      - name: Test Worker
        run: npm test --workspace=workers/api

      - name: Confirm private scanner is not tracked
        shell: bash
        run: |
          test -z "$(git ls-files packages/scanner)"

      - name: Secret safety check
        shell: bash
        run: |
          if git grep -n -E "sk_live_[A-Za-z0-9]{12,}|whsec_[A-Za-z0-9]{12,}|-----BEGIN PRIVATE KEY-----|CLOUDFLARE_API_TOKEN" -- . \
            ':!package-lock.json' \
            ':!.github/workflows/ci.yml' \
            ':!workers/api/test/source.test.mjs'; then
            echo "Potential real secret found. Remove it before merging."
            exit 1
          fi