name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Create CI scanner stub
        shell: bash
        run: |
          if [ ! -d packages/scanner ]; then
            mkdir -p packages/scanner/src packages/scanner/dist
            cat > packages/scanner/package.json <<'JSON'
          {
            "name": "@agentverify/scanner",
            "version": "1.3.0",
            "private": true,
            "main": "./dist/index.js",
            "module": "./dist/index.js",
            "types": "./dist/index.d.ts",
            "scripts": {
              "build": "node -e \"console.log('CI scanner stub: no private scanner build')\"",
              "test": "node -e \"console.log('CI scanner stub: private scanner tests run outside public CI')\""
            }
          }
          JSON
            cat > packages/scanner/src/index.ts <<'TS'
          export type Verdict = 'VERIFIED' | 'NOT VERIFIED'
          export type RiskLevel = 'Low Risk' | 'Moderate Risk' | 'High Risk'
          export type Category = 'A' | 'B'
          export type Severity = 'critical' | 'high' | 'medium' | 'low'
          export type ThreatCategoryStatus = 'detected' | 'possible' | 'missing_evidence' | 'not_assessed'

          export interface ScanInput {
            content: string
            fileName?: string
            fileSize?: number
            platform?: string
          }

          export interface CategoryScore {
            category: Category
            label: string
            score: number
            maxScore: number
            findingCount: number
          }

          export interface Finding {
            id?: string
            code?: string
            title: string
            category: Category
            severity: Severity
            whatIsWrong?: string
            whyItMatters?: string
            recommendedFix?: string
            evidence?: string
            quickFix?: string
            fixCode?: string
            compliance?: {
              owasp?: string[]
              nist?: string[]
              soc2?: string[]
            }
          }

          export interface RuntimeBOM {
            detectedLanguage: string
            detectedFramework: string | null
            detectedPlatform: string | null
            agentName: string | null
            toolAccessLevel: 'Restricted' | 'Unrestricted' | 'Unknown'
            credentialExposure: 'Detected' | 'Not Detected'
            memoryPersistence: 'Bounded' | 'Unbounded' | 'Unknown'
            auditLogging: 'Present' | 'Absent' | 'Unknown'
            humanGates: 'Present' | 'Absent' | 'Unknown'
            rateLimiting: 'Present' | 'Absent' | 'Unknown'
            promptInjectionSurface: 'Detected' | 'Not Detected' | 'Unknown'
            delegationScope: 'Scoped' | 'Unscoped' | 'Unknown'
          }

          export interface ThreatCategoryAssessment {
            id: string
            label: string
            status: ThreatCategoryStatus
            severity: Severity
            whatItMeans: string
            evidencePattern: string
            whyItMatters: string
            recommendedFix: string
            a2spaImpact: string
          }

          export interface ScanResult {
            reportId: string
            verdict: Verdict
            riskScore: number
            riskLevel: RiskLevel
            confidence?: number
            findings: Finding[]
            categoryScores?: CategoryScore[]
            bom?: RuntimeBOM
            reportInsights?: Record<string, unknown>
            threatCategories?: ThreatCategoryAssessment[]
            metadata: {
              schemaVersion: string
              scannerVersion: string
              fileName: string
              fileSize: number
              scannedAt: string
              detectedLanguage: string
              detectedFramework: string | null
              selectedPlatform: string | null
              agentName: string | null
              scanDuration: number
            }
          }

          export function scan(input: ScanInput): ScanResult {
            return {
              reportId: 'CI-STUB-REPORT',
              verdict: 'NOT VERIFIED',
              riskScore: 0,
              riskLevel: 'High Risk',
              confidence: 0,
              findings: [],
              categoryScores: [],
              threatCategories: [],
              metadata: {
                schemaVersion: '1.3.0',
                scannerVersion: 'ci-stub',
                fileName: input.fileName ?? 'agent.txt',
                fileSize: input.fileSize ?? input.content.length,
                scannedAt: new Date().toISOString(),
                detectedLanguage: 'Unknown',
                detectedFramework: null,
                selectedPlatform: input.platform ?? null,
                agentName: null,
                scanDuration: 0,
              },
            }
          }
          TS
            cp packages/scanner/src/index.ts packages/scanner/dist/index.d.ts
            cat > packages/scanner/dist/index.js <<'JS'
          export function scan(input) {
            return {
              reportId: 'CI-STUB-REPORT',
              verdict: 'NOT VERIFIED',
              riskScore: 0,
              riskLevel: 'High Risk',
              confidence: 0,
              findings: [],
              categoryScores: [],
              threatCategories: [],
              metadata: {
                schemaVersion: '1.3.0',
                scannerVersion: 'ci-stub',
                fileName: input.fileName || 'agent.txt',
                fileSize: input.fileSize || input.content.length,
                scannedAt: new Date().toISOString(),
                detectedLanguage: 'Unknown',
                detectedFramework: null,
                selectedPlatform: input.platform || null,
                agentName: null,
                scanDuration: 0,
              },
            }
          }
          JS
          fi
      - run: npm install
      - run: npm run lint
      - run: npm run build --workspace=apps/web
      - run: npm run build --workspace=packages/cli
      - run: npm test --workspace=packages/cli
      - run: npm run build --workspace=workers/api
      - run: npm test --workspace=workers/api
