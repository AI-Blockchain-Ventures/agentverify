name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Create public CI scanner stub
        run: node scripts/create-ci-scanner-stub.mjs

      - name: Lint web
        run: npm run lint

      - name: Build web
        run: npm run build --workspace=apps/web

      - name: Build CLI
        run: npm run build --workspace=packages/cli

      - name: Test CLI
        run: npm test --workspace=packages/cli

      - name: Build Worker
        run: npm run build --workspace=workers/api

      - name: Test Worker
        run: npm test --workspace=workers/api
