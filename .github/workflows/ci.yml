name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run lint
      - run: npm run build:scanner
      - run: npm run test:scanner
      - run: npm run build:cli
      - run: npm run check:worker
      - run: npm run build:worker
      - run: npm run test:worker
      - run: npm run build
