name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Create CI scanner stub
        run: node scripts/create-ci-scanner-stub.mjs
      - run: npm install
      - run: npm run lint
      - run: npm run build --workspace=apps/web
      - run: npm run build --workspace=packages/cli
      - run: npm test --workspace=packages/cli
      - run: npm run build --workspace=workers/api
      - run: npm test --workspace=workers/api
